name: Release

on:
  push:
    tags:
      - "v*.*.*" # Triggers on version tags: v1.0.0, v2.1.3, etc.

permissions:
  contents: write # Needed to create GitHub Releases

jobs:
  # ====================================================================
  # Build, Package, and Release
  # ====================================================================
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build Extension (Production)
        run: npm run vscode:prepublish

      - name: Package Extension
        run: npm run package

      - name: Get VSIX filename
        id: vsix
        run: echo "file=$(ls *.vsix)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.vsix.outputs.file }}
          generate_release_notes: true # Uses .github/release.yml for categorization
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }} # pre-release if tag has a dash (e.g. v2.0.0-beta.1)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        run: npm run publish
        env:
          VSCE_PAT: ${{ secrets.VS_MARKETPLACE_TOKEN }}
